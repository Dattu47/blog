<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Blog</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .navbar-dark .navbar-nav .nav-link {
            font-size: large;
            font-weight:800 ;
            color: #094480 !important;
        }
        .navbar-dark .navbar-nav .nav-link:hover {
            color: #097c5a !important;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="/">
            <img src="/static/blog.png" width="40" alt="logo">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="/blog">Write a Blog</a></li>
                <li class="nav-item"><a class="nav-link" href="/admin">Admin Panel</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5 fade-in">
    {% block content %}{% endblock %}
</div>

<footer class="bg-dark text-light text-center py-3 mt-5">
    <p class="mb-0">© 2025 My Blog App. Crafted with ❤️ by Victus</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
